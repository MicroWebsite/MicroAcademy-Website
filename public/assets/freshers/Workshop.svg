<svg width="100%" height="100%" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for gradients, filters, patterns -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF9F3" />
      <stop offset="100%" stop-color="#EBEADE" />
    </linearGradient>
    
    <!-- Primary Brand Gradient (Olive/Gold) -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B8200" />
      <stop offset="100%" stop-color="#6A5F00" />
    </linearGradient>

    <!-- Secondary Brand Gradient (Bright Yellow) -->
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBE426" />
      <stop offset="100%" stop-color="#D4AD00" />
    </linearGradient>

    <!-- Dark Accents Gradient -->
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2F312F" />
      <stop offset="100%" stop-color="#1B1C19" />
    </linearGradient>

    <!-- Soft Accent Glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FBE426" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#FBE426" stop-opacity="0" />
    </radialGradient>

    <!-- Glassmorphism Gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#FAF9F3" stop-opacity="0.6" />
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#6A5F00" flood-opacity="0.12" />
    </filter>
    
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1B1C19" flood-opacity="0.06" />
    </filter>

    <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Rect -->
  <rect width="800" height="500" rx="24" fill="url(#bgGrad)" />

  <!-- Background Decorative Elements -->
  <!-- Circular Orbits/Waves -->
  <circle cx="400" cy="250" r="220" stroke="#E2E0D4" stroke-width="1.5" stroke-dasharray="8 6" opacity="0.6" />
  <circle cx="400" cy="250" r="160" stroke="#E2E0D4" stroke-width="1" opacity="0.4" />
  <circle cx="400" cy="250" r="280" stroke="#E2E0D4" stroke-width="1" stroke-dasharray="4 4" opacity="0.3" />

  <!-- Decorative floating cross/plus symbols -->
  <path d="M 120 150 L 130 150 M 125 145 L 125 155" stroke="#6A5F00" stroke-width="2" opacity="0.3" />
  <path d="M 680 320 L 690 320 M 685 315 L 685 325" stroke="#6A5F00" stroke-width="2" opacity="0.3" />
  <path d="M 620 120 L 630 120 M 625 115 L 625 125" stroke="#FBE426" stroke-width="2.5" opacity="0.6" />
  
  <!-- Grid Dots -->
  <pattern id="dotGrid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="3" cy="3" r="1.5" fill="#E2E0D4" opacity="0.7" />
  </pattern>
  <rect x="50" y="50" width="700" height="400" fill="url(#dotGrid)" opacity="0.5" />

  <!-- Soft light glow in center -->
  <circle cx="400" cy="230" r="200" fill="url(#glow)" />

  <!-- CENTRAL ILLUSTRATION GROUP -->
  <g transform="translate(0, 10)">
    
    <!-- Floating Card 1 (Left): Skill/Code Card -->
    <g filter="url(#shadow)" transform="translate(140, 160)">
      <!-- Card Body -->
      <rect width="180" height="130" rx="16" fill="url(#glassGrad)" stroke="#FFFFFF" stroke-width="1.5" />
      <rect x="0.75" y="0.75" width="178.5" height="128.5" rx="15.25" stroke="#E2E0D4" stroke-width="1.5" opacity="0.5" />
      
      <!-- Window controls (dots) -->
      <circle cx="20" cy="20" r="5" fill="#6A5F00" opacity="0.8" />
      <circle cx="35" cy="20" r="5" fill="#FBE426" />
      <circle cx="50" cy="20" r="5" fill="#E2E0D4" />

      <!-- Code Icon (</>) -->
      <g transform="translate(20, 45)">
        <rect width="40" height="40" rx="10" fill="url(#primaryGrad)" />
        <!-- brackets -->
        <path d="M 16 15 L 10 20 L 16 25" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M 24 15 L 30 20 L 24 25" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M 22 13 L 18 27" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" />
      </g>
      
      <!-- Text Lines (represented by rounded bars) -->
      <rect x="75" y="48" width="85" height="8" rx="4" fill="#1B1C19" opacity="0.8" />
      <rect x="75" y="64" width="60" height="8" rx="4" fill="#6A5F00" opacity="0.6" />
      <rect x="75" y="80" width="75" height="8" rx="4" fill="#FBE426" opacity="0.9" />
      
      <!-- Small tags -->
      <rect x="20" y="98" width="55" height="16" rx="8" fill="#FBE426" fill-opacity="0.2" />
      <rect x="20" y="98" width="55" height="16" rx="8" stroke="#FBE426" stroke-width="1" />
      <text x="47.5" y="110" font-family="Inter, sans-serif" font-size="8" font-weight="bold" fill="#6A5F00" text-anchor="middle">HTML/CSS</text>
      
      <rect x="85" y="98" width="50" height="16" rx="8" fill="#6A5F00" fill-opacity="0.1" />
      <text x="110" y="110" font-family="Inter, sans-serif" font-size="8" font-weight="bold" fill="#6A5F00" text-anchor="middle">REACT</text>
    </g>

    <!-- Floating Card 2 (Right): Growth & Success Card -->
    <g filter="url(#shadow)" transform="translate(480, 190)">
      <!-- Card Body -->
      <rect width="190" height="140" rx="16" fill="url(#glassGrad)" stroke="#FFFFFF" stroke-width="1.5" />
      <rect x="0.75" y="0.75" width="188.5" height="138.5" rx="15.25" stroke="#E2E0D4" stroke-width="1.5" opacity="0.5" />
      
      <!-- Title -->
      <text x="20" y="28" font-family="Inter, sans-serif" font-size="12" font-weight="bold" fill="#1B1C19">Placement Growth</text>
      
      <!-- Graph background lines -->
      <line x1="20" y1="60" x2="170" y2="60" stroke="#E2E0D4" stroke-width="1" stroke-dasharray="4 4" />
      <line x1="20" y1="85" x2="170" y2="85" stroke="#E2E0D4" stroke-width="1" stroke-dasharray="4 4" />
      <line x1="20" y1="110" x2="170" y2="110" stroke="#E2E0D4" stroke-width="1" />
      
      <!-- Chart line (growing) -->
      <path d="M 20 105 Q 50 95 70 75 T 120 70 T 150 45 L 170 40" fill="none" stroke="url(#primaryGrad)" stroke-width="3.5" stroke-linecap="round" />
      
      <!-- Glowing dot at target -->
      <circle cx="150" cy="45" r="7" fill="#FBE426" filter="url(#glowFilter)" />
      <circle cx="150" cy="45" r="4" fill="#6A5F00" />
      
      <!-- Floating Badge on chart -->
      <g transform="translate(100, 15)">
        <rect width="70" height="20" rx="10" fill="#6A5F00" />
        <text x="35" y="13" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF" text-anchor="middle">100% Hired</text>
      </g>
    </g>

    <!-- MAIN CENTRAL OBJECT: Laptop with Glowing Screen -->
    <g filter="url(#shadow)" transform="translate(260, 200)">
      <!-- Laptop Screen (Open/Tilted back) -->
      <!-- Screen Back / Outer Border -->
      <rect x="40" y="0" width="200" height="130" rx="12" fill="url(#darkGrad)" />
      <!-- Inner Screen (Display area) -->
      <rect x="46" y="6" width="188" height="114" rx="8" fill="#1B1C19" />
      
      <!-- Screen Content (IDE/Code Editor mockup) -->
      <!-- Sidebar -->
      <rect x="46" y="6" width="30" height="114" rx="0" fill="#252725" />
      <circle cx="56" cy="18" r="3" fill="#6A5F00" />
      <circle cx="56" cy="30" r="3" fill="#FBE426" />
      <circle cx="56" cy="42" r="3" fill="#E2E0D4" />
      
      <!-- Code lines on screen -->
      <rect x="85" y="20" width="80" height="6" rx="3" fill="#6A5F00" opacity="0.8" />
      <rect x="85" y="32" width="110" height="6" rx="3" fill="#FBE426" />
      <rect x="100" y="44" width="70" height="6" rx="3" fill="#EBEADE" opacity="0.6" />
      <rect x="100" y="56" width="95" height="6" rx="3" fill="#6A5F00" />
      <rect x="115" y="68" width="50" height="6" rx="3" fill="#FBE426" opacity="0.9" />
      <rect x="100" y="80" width="80" height="6" rx="3" fill="#EBEADE" opacity="0.4" />
      <rect x="85" y="92" width="60" height="6" rx="3" fill="#6A5F00" opacity="0.8" />

      <!-- Glowing Code Symbol overlays -->
      <g transform="translate(145, 45)" opacity="0.8">
        <circle cx="20" cy="20" r="25" fill="url(#glow)" />
        <text x="20" y="26" font-family="Inter, sans-serif" font-size="20" font-weight="extrabold" fill="#FBE426" text-anchor="middle">{ }</text>
      </g>

      <!-- Laptop Base -->
      <!-- Base hinge/top -->
      <path d="M 30 130 L 250 130 L 260 142 L 20 142 Z" fill="#EBEADE" />
      <!-- Base bottom chassis -->
      <path d="M 20 142 C 20 142 20 147 28 147 L 252 147 C 260 147 260 142 260 142 Z" fill="#D9D2C3" />
      <!-- Keyboard Area -->
      <rect x="45" y="133" width="190" height="5" rx="2" fill="#1B1C19" opacity="0.8" />
      <!-- Trackpad -->
      <rect x="120" y="139" width="40" height="3" rx="1" fill="#D9D2C3" />
      
      <!-- Glowing base light -->
      <ellipse cx="140" cy="148" rx="70" ry="4" fill="#FBE426" opacity="0.4" filter="url(#glowFilter)" />
    </g>

    <!-- Floating Graduate Cap (Top Center/Right) -->
    <g filter="url(#shadow)" transform="translate(360, 50)">
      <!-- Outer Glow -->
      <circle cx="45" cy="45" r="45" fill="url(#glow)" />
      
      <!-- Graduation Cap Drawing -->
      <!-- Diamond top -->
      <polygon points="45,15 80,30 45,45 10,30" fill="url(#primaryGrad)" stroke="#FFFFFF" stroke-width="1.5" />
      <!-- Cap base -->
      <path d="M 25 36 L 25 48 C 25 54 65 54 65 48 L 65 36" fill="#6A5F00" stroke="#FFFFFF" stroke-width="1.5" />
      <!-- Tassel -->
      <path d="M 45 30 L 74 38 L 74 52" fill="none" stroke="#FBE426" stroke-width="2" stroke-linecap="round" />
      <circle cx="74" cy="54" r="3" fill="#FBE426" />
      
      <!-- Small Sparkles -->
      <path d="M 5 20 L 7 15 L 12 17 L 7 19 Z" fill="#FBE426" />
      <path d="M 85 20 L 87 15 L 92 17 L 87 19 Z" fill="#FBE426" />
    </g>
    
    <!-- Floating Skill Badges/Circles -->
    <!-- JS Badge -->
    <g filter="url(#softShadow)" transform="translate(320, 140)">
      <circle cx="20" cy="20" r="20" fill="url(#secondaryGrad)" stroke="#FFFFFF" stroke-width="1.5" />
      <text x="20" y="25" font-family="Inter, sans-serif" font-size="13" font-weight="900" fill="#6A5F00" text-anchor="middle">JS</text>
    </g>

    <!-- Python Badge -->
    <g filter="url(#softShadow)" transform="translate(460, 120)">
      <circle cx="18" cy="18" r="18" fill="url(#primaryGrad)" stroke="#FFFFFF" stroke-width="1.5" />
      <text x="18" y="23" font-family="Inter, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Py</text>
    </g>

    <!-- SQL Badge -->
    <g filter="url(#softShadow)" transform="translate(230, 310)">
      <circle cx="22" cy="22" r="22" fill="#1B1C19" stroke="#FFFFFF" stroke-width="1.5" />
      <text x="22" y="27" font-family="Inter, sans-serif" font-size="11" font-weight="bold" fill="#FBE426" text-anchor="middle">SQL</text>
    </g>
    
    <!-- Star elements (success) -->
    <g transform="translate(420, 160)" filter="url(#softShadow)">
      <path d="M 12 0 L 15 8 L 24 9 L 18 15 L 20 23 L 12 19 L 4 23 L 6 15 L 0 9 L 9 8 Z" fill="#FBE426" />
    </g>
    <g transform="translate(270, 90)" filter="url(#softShadow)" opacity="0.8">
      <path d="M 8 0 L 10 5 L 16 6 L 12 10 L 13 15 L 8 12 L 3 15 L 4 10 L 0 6 L 6 5 Z" fill="#FBE426" />
    </g>
    <g transform="translate(520, 100)" filter="url(#softShadow)" opacity="0.6">
      <path d="M 8 0 L 10 5 L 16 6 L 12 10 L 13 15 L 8 12 L 3 15 L 4 10 L 0 6 L 6 5 Z" fill="#6A5F00" />
    </g>
    
    <!-- Connecting Curved dotted lines for pathway -->
    <path d="M 230 200 C 260 170 300 170 320 160" fill="none" stroke="#6A5F00" stroke-width="2" stroke-dasharray="4 4" opacity="0.5" />
    <path d="M 440 220 C 470 200 480 180 500 160" fill="none" stroke="#6A5F00" stroke-width="2" stroke-dasharray="4 4" opacity="0.5" />
    <path d="M 380 140 C 380 170 370 190 350 200" fill="none" stroke="#FBE426" stroke-width="2" stroke-dasharray="4 4" opacity="0.7" />

  </g>
</svg>
