<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Solid Black Background -->
  <rect width="800" height="500" fill="#0A0A0A" />
  
  <!-- Subtle Dot Grid for Texture -->
  <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.5" fill="#222222" />
  </pattern>
  <rect width="800" height="500" fill="url(#dotGrid)" />
  
  <!-- Content -->
  <g transform="translate(400, 240)">
    <!-- Main Title -->
    <text x="0" y="-10" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">
      FRESHERS DRIVE
    </text>
    
    <!-- Subtitle -->
    <text x="0" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#A0A0A0" text-anchor="middle" letter-spacing="0.5">
      "Empowering the next generation of tech leaders"
    </text>
    
    <!-- Accent Line (Micro Academy Yellow) -->
    <rect x="-40" y="60" width="80" height="4" rx="2" fill="#FBE426" />
  </g>
</svg>
